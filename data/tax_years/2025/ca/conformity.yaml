# California IRC Conformity — Tax Year 2025
#
# California generally conforms to the Internal Revenue Code (IRC) as of
# January 1, 2015 (with selective updates). This file documents key areas
# where CA treatment differs from federal, driving Schedule CA adjustments.
#
# Reference: CA Revenue & Taxation Code Section 17024.5

conformity_date: "2015-01-01"
tax_year: 2025

# Areas where CA conforms to federal treatment (no Schedule CA adjustment needed)
conforms:
  - area: "Wages and Salaries"
    notes: "CA conforms to federal wage treatment"

  - area: "Business Income (Schedule C)"
    notes: "CA conforms to federal Schedule C; no Schedule CA adjustment"

  - area: "Self-Employment Tax (Schedule SE)"
    notes: "CA conforms to federal SE tax computation"

  - area: "Capital Gains (Schedule D)"
    notes: "CA conforms to federal capital gain definitions; CA taxes LTCG as ordinary income via CA brackets"

  - area: "Gambling Losses"
    notes: "CA conforms — deductible up to gambling winnings (itemized)"

  - area: "IRA/401k Contributions"
    notes: "CA conforms to federal retirement contribution limits"

  - area: "Student Loan Interest"
    notes: "CA conforms to federal student loan interest deduction"

  - area: "Educator Expenses"
    notes: "CA conforms to federal above-the-line educator expense deduction"

# Areas where CA differs from federal treatment (Schedule CA adjustments required)
differs:
  - area: "Social Security Benefits"
    federal: "Partially taxable (up to 85%)"
    california: "Not taxable (fully exempt)"
    schedule_ca_line: "6a"
    adjustment: "subtraction"
    notes: "Subtract any taxable SS benefits reported on federal return"

  - area: "SALT Deduction"
    federal: "Deductible up to $10,000 ($5,000 MFS)"
    california: "No deduction for state/local income taxes; property taxes allowed with no cap"
    schedule_ca_line: "5a, 5e"
    adjustment: "subtraction and addition"
    notes: "Remove federal SALT (including capped amount), add back CA property taxes only"

  - area: "Standard Deduction"
    federal: "$15,000 single / $30,000 MFJ (2025)"
    california: "$5,706 single / $11,412 MFJ (2025)"
    schedule_ca_line: ""
    adjustment: "none"
    notes: "Different amounts; handled by CA Form 540 line 18, not Schedule CA"

  - area: "QBI Deduction (Section 199A)"
    federal: "Up to 20% deduction for qualified business income"
    california: "Not allowed"
    schedule_ca_line: "13"
    adjustment: "implicit"
    notes: "CA does not allow QBI deduction; CA starts from federal AGI and applies own deductions"

  - area: "Municipal Bond Interest"
    federal: "Tax-exempt for all states"
    california: "Only CA-issued bonds are exempt; out-of-state bonds are taxable"
    schedule_ca_line: "2a"
    adjustment: "addition"
    notes: "Add back interest from non-CA municipal bonds"

  - area: "Health Savings Account (HSA)"
    federal: "Contributions deductible; earnings tax-free"
    california: "No deduction; earnings taxable"
    schedule_ca_line: "15"
    adjustment: "addition"
    notes: "Add back federal HSA deduction on Schedule CA line 15 column C"

  - area: "529 Plan Distributions"
    federal: "Up to $10,000/year for K-12 tuition is tax-free"
    california: "K-12 distributions are taxable; higher-ed distributions are tax-free"
    schedule_ca_line: "8"
    adjustment: "addition"
    notes: "Add back K-12 529 distributions that were tax-free federally"

  - area: "Moving Expenses"
    federal: "Deductible only for active-duty military"
    california: "Deductible for all taxpayers meeting distance/time tests"
    schedule_ca_line: "14"
    adjustment: "subtraction"
    notes: "CA allows broader moving expense deduction than federal"

  - area: "Mental Health Services Tax"
    federal: "N/A"
    california: "Additional 1% on taxable income over $1,000,000"
    schedule_ca_line: ""
    adjustment: "none"
    notes: "CA-only surtax; computed on Form 540 line 62 (Behavioral Health Services Tax)"

  - area: "Exemption Credits"
    federal: "Personal exemptions eliminated (2018-2025 under TCJA)"
    california: "$153 per exemption (personal, senior, blind, dependent)"
    schedule_ca_line: ""
    adjustment: "none"
    notes: "CA retains exemption credits; computed on Form 540 lines 7-11"

  - area: "Capital Gains Tax Rate"
    federal: "Preferential rates: 0%, 15%, 20% for long-term gains"
    california: "No preferential rate; LTCG taxed as ordinary income"
    schedule_ca_line: ""
    adjustment: "none"
    notes: "Handled by CA bracket structure, not a Schedule CA adjustment"
