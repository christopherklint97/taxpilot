services:
  api:
    build:
      context: .
      target: api
    container_name: taxpilot-api
    ports:
      - "4100:4100"
    environment:
      - DATABASE_URL=/data/taxpilot.db
      - PORT=4100
      - RUST_LOG=info
    volumes:
      - api-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    container_name: taxpilot-web
    ports:
      - "4101:4101"
    environment:
      - API_URL=http://api:4100
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
